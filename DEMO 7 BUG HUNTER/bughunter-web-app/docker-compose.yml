version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - PORT=3000
    depends_on:
      - redis

  worker:
    build: ./backend
    command: node worker.js
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
